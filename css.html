<style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f4f6f9; display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: all 0.3s; }
    .sidebar-header { padding: 20px; font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid #34495e; }
    .nav-link { color: #bdc3c7; padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .nav-link:hover { background-color: #34495e; color: white; }
    .nav-link.active { background-color: #1abc9c; color: white; }
    .main-content { flex-grow: 1; overflow-y: auto; padding: 20px; background-color: #f4f6f9; }
    .page-section { display: none; }
    .page-section.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .kpi-value { font-size: 1.6rem; font-weight: 800; }
    .filter-section { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    .summary-table-container { max-height: 250px; overflow-y: auto; margin-top: 15px; border: 1px solid #eee; border-radius: 8px; }
    .summary-table { font-size: 0.85rem; width: 100%; margin-bottom: 0; }
    .summary-table thead th { position: sticky; top: 0; background: #f8f9fa; z-index: 1; text-align: center;}
    .th-cost { color: #198754; } .th-debt { color: #dc3545; } .th-comp { color: #ffc107; } .th-remain { color: #0d6efd; }
    
    /* แก้ไขความสูงที่นี่จาก 500px เป็น 300px */
    .chart-container { height: 300px; width: 100%; }
    
    @media (max-width: 768px) {
      .sidebar { position: fixed; height: 100%; z-index: 1000; left: -250px; }
      .sidebar.show { left: 0; }
      .mobile-toggle { display: block !important; position: fixed; top: 10px; right: 10px; z-index: 1001; }
    }
    .mobile-toggle { display: none; }
</style>
